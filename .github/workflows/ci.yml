# https://docs.github.com/en/actions/reference/workflow-syntax-for-github-actions
name: CI

on: [push]

# Skip the Playwright Chromium download during `yarn install`.
#
# `@vscode/test-web` (devDep of the vscode-extension workspace) pulls
# `@playwright/browser-chromium`, whose `install` script downloads ~150 MB
# of Chromium and consistently exceeds the runner's [4/4] phase budget on
# a yarn-cache miss (Node 24 + Ubuntu/Windows; observed in the integration
# job that hung at `Building fresh packages...` for 15m 50s before the
# 30-minute step timeout fired). The CI jobs below run unit + integration
# vitest specs only — none of them invoke `@vscode/test-web` and none need
# a real Chromium binary. Engineers running `yarn dev:web` locally to
# exercise the VS Code web extension still get Chromium because the env
# var is scoped to this workflow.
env:
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

jobs:
  code-quality:
    runs-on: ubuntu-latest
    name: Code quality
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 22
          cache: "yarn"
          cache-dependency-path: "yarn.lock"

      - name: Install the packages
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Build the code
        run: yarn build:ci

      - name: Type check (for tests)
        run: yarn type-check

      - name: Check formatting
        run: yarn format:check

  tests:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        node-version: [22, 24]

    name: Tests / OS ${{ matrix.os }} / NodeJS ${{ matrix.node-version }}

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: "yarn"
          cache-dependency-path: "yarn.lock"

      - name: Install the packages
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Build the code
        run: yarn build:ts

      - name: Run the unit tests
        run: yarn test

      - name: Run the prettier2 unit tests
        run: yarn --cwd packages/prettier-plugin-liquid test

      - name: Run the prettier2 idempotence tests
        run: yarn --cwd packages/prettier-plugin-liquid test:idempotence

      - name: Run the prettier3 unit tests
        run: yarn --cwd packages/prettier-plugin-liquid test:3

      - name: Run the prettier3 idempotence tests
        run: yarn --cwd packages/prettier-plugin-liquid test:idempotence:3
