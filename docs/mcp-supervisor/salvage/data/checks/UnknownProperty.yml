name: UnknownProperty
summary: Property cannot be verified on the given object
hint:
  page: >-
    Check the correct traversal path: graphql results use `result.records.results`, not `result.results`. Use lookup
    (hover mode) to verify available properties.
  partial: >-
    The linter can't track property types across file boundaries. Add a {% doc %} block: {% doc %} @param {object}
    var_name {% enddoc %} to declare the parameter type.
  default: >-
    The linter cannot verify this property exists. Check the object's traversal path, or add a {% doc %} @param
    declaration if in a partial/command.
