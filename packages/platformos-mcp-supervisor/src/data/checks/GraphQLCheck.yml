name: GraphQLCheck
summary: GraphQL query/mutation has structural errors
hint:
  default: >-
    Record fields: id, table, created_at, updated_at, user_id, external_id, properties_object, property(name: "x").
    Custom properties: `property(name: "field")` NOT direct access. StringFilter: `{ value: "x" }` object syntax.
    PropertyFilter fields: value, contains, starts_with, ends_with, not_contains, not_starts_with, not_ends_with,
    value_in, not_value, not_value_in, range, case_sensitive (NO operator, NO like). Sort: `sort: [{ properties: [{
    name: "field", order: DESC }] }]` — ASC/DESC unquoted. Pagination: `total_entries` NOT total_count. No relation
    traversal on records — use separate queries.
