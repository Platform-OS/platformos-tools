try_catch:
  summary: Error handling with {% try %}...{% catch error %}...{% endtry %}
  syntax: |-
    {% try %}
      {% graphql result = 'query' %}
    {% catch error %}
      Error: {{ error }}
    {% endtry %}
  notes: >-
    The `error` variable in {% catch error %} is automatically recognized by the linter — no {% doc %} declaration
    needed. Use for GraphQL calls, API calls, or any operation that might fail.
  added_in: v0.3.3
theme_render_rc:
  summary: Render a partial from theme search paths
  syntax: '{% theme_render_rc ''partial_name'', arg: value %}'
  notes: >-
    Like {% render %} but searches theme_search_paths for the partial. Used for theming/white-labeling. Accepts the same
    arguments as render.
  added_in: v0.3.3
liquid_doc:
  summary: Parameter documentation block for partials, commands, and queries
  syntax: |-
    {% doc %}
      @param {type} name - description
      @prompt what this partial does
      @example {% render 'partial', name: 'value' %}
    {% enddoc %}
  annotations:
    '@param': >-
      {type} name - description. Types (MUST be lowercase): string, number, boolean, object, array, untyped. WRONG:
      {String}, {Object}. RIGHT: {string}, {object}. NEVER pass null for a typed parameter — use the matching empty
      value. Required: @param {string} name. Optional: @param {string} [name].
    '@prompt': Natural language description of the partial's purpose (used by AI agents for discovery).
    '@example': Usage example showing how to render/call this partial.
    '@description': Detailed description of behavior and side effects.
  notes: >-
    NEVER pass null for a typed parameter — use the matching empty value: '' for {string}, 0 for {number}, false for
    {boolean}, {} for {object}, [] for {array}. Required param: @param {string} name. Optional param: @param {string}
    [name].
graphql_field_completions:
  summary: GraphQL field completions and hover docs in .graphql files
  notes: >-
    The LSP provides field-level completions and hover documentation inside .graphql files. Use lookup (completions
    mode) and lookup (hover mode) in GraphQL files to discover available fields, types, and query structure.
  added_in: v0.3.3
hash_literals:
  summary: Hash (object) literals in {% assign %} — replaces {% parse_json %}
  syntax: |-
    {% assign my_hash = {} %}
    {% assign my_hash = { "name": "John", "age": 30 } %}
    {% assign nested = { "user": { "name": "John" }, "roles": ["admin"] } %}
  replaces: '{% parse_json %} / {% endparse_json %} blocks'
  migration: |-
    Old: {% parse_json my_hash %}{"name": "John"}{% endparse_json %}
    New: {% assign my_hash = { "name": "John" } %}
  notes: Supports nested structures with hashes and arrays. parse_json is deprecated — use assign with hash literals instead.
array_literals:
  summary: Array literals in {% assign %} — direct initialization
  syntax: |-
    {% assign arr = [] %}
    {% assign arr = ["apple", "banana", "cherry"] %}
    {% assign mixed = [1, "two", true, null] %}
  replaces: '{% assign arr = '''' | split: '','' %} and {% parse_json arr %}[...]{% endparse_json %}'
  migration: |-
    Old: {% parse_json arr %}["apple", "banana"]{% endparse_json %}
    New: {% assign arr = ["apple", "banana"] %}
  notes: Direct array initialization replaces filter-dependent approaches. Supports mixed types.
assign_bracket_dot:
  summary: Enhanced assign with bracket and dot notation — replaces {% hash_assign %}
  syntax: |-
    {% assign hash["greeting"] = "hello" %}
    {% assign hash.farewell = "goodbye" %}
    {% assign hash["nested"]["key"] = "value" %}
  replaces: '{% hash_assign %} tag'
  migration: |-
    Old: {% hash_assign my_hash["key"] = "value" %}
    New: {% assign my_hash["key"] = "value" %}
  notes: >-
    Bracket and dot notation work interchangeably. hash_assign is deprecated — use assign with bracket/dot notation
    instead.
array_append_operator:
  summary: Array append operator (<<) for adding elements to arrays
  syntax: |-
    {% assign my_array = [] %}
    {% assign my_array << "first" %}
    {% assign my_array << "second" %}
  replaces: Workarounds using concat filter or parse_json manipulation
  notes: Appends a single element to an existing array. The array must be initialized first.
string_interpolation:
  summary: String interpolation in double-quoted strings using {{ }} syntax
  syntax: |-
    {% assign greeting = "Hello {{ context.current_user.name }}!" %}
    {% assign url = "/api/{{ context.params.id }}/details" %}
  requires: 'string_interpolation: true in app/config.yml'
  notes: >-
    Double-quoted strings support {{ }} interpolation. Single-quoted strings remain literal (no interpolation). Must
    enable string_interpolation: true in configuration.
parse_json_deprecation:
  summary: '{% parse_json %} is deprecated — use {% assign %} with hash/array literals'
  syntax: |-
    Old: {% parse_json obj %}{"key": "value"}{% endparse_json %}
    New: {% assign obj = { "key": "value" } %}

    Old: {% parse_json arr %}["a", "b"]{% endparse_json %}
    New: {% assign arr = ["a", "b"] %}
  severity: deprecation
  notes: >-
    parse_json is replaced by assign with hash/array literals. The new syntax is cleaner, supports nesting, and has
    better type safety.
hash_assign_deprecation:
  summary: '{% hash_assign %} is deprecated — use {% assign %} with bracket/dot notation'
  syntax: |-
    Old: {% hash_assign my_hash["key"] = "value" %}
    New: {% assign my_hash["key"] = "value" %}

    Old: {% hash_assign my_hash["key"] = "value" %}
    New: {% assign my_hash.key = "value" %}
  severity: deprecation
  notes: hash_assign is replaced by the enhanced assign tag. Both bracket notation and dot notation are supported.
filter_argument_rules:
  summary: Common filter argument patterns — the linter checks filter names but NOT argument syntax
  rules:
    map: 'One positional arg (property name): {{ items | map: "price" }}. Does NOT accept named args.'
    sort: 'One optional positional arg: {{ items | sort: "name" }}. Does NOT accept named args like order:.'
    where: '1-2 positional args: {{ items | where: "status", "active" }}. Does NOT accept named args.'
    replace: '2 positional args: {{ string | replace: "old", "new" }}.'
    slice: '1-2 positional args (offset, length): {{ string | slice: 0, 5 }}.'
    default: '1 positional arg + optional allow_false: {{ var | default: "fallback", allow_false: true }}.'
    t: 'Named args only: {{ "key" | t: name: "value" }}. Translation key goes before the pipe.'
    date: '1 positional arg (format string): {{ "now" | date: "%Y-%m-%d" }}.'
  notes: >-
    pos-cli check validates filter names but not argument patterns. pos-supervisor adds structural warnings for known
    misuse patterns (wrong number of args, named args where not supported).
