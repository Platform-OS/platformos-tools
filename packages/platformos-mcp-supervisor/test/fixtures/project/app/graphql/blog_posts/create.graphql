mutation create($title: String!, $body: String, $author_id: String) {
  record_create(
    record: {
      table: "blog_post"
      properties: [
        { name: "title", value: $title }
        { name: "body", value: $body }
        { name: "author_id", value: $author_id }
      ]
    }
  ) {
    id
    properties
  }
}
